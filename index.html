<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Daytona Kart Draw</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #333333;
            overflow-x: hidden;
            color: white;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            color: white;
            margin: 5px;
        }

        /* DRAW BUTTONS */
        #drawSodiButton {
            padding: 20px 40px;
            font-size: 28px;
            background-color: #007bff;
        }

        #drawDmaxButton {
            padding: 20px 40px;
            font-size: 28px;
            background-color: #e40521;
        }

        #output, #listDisplay, #remainingCount, #drawnNumbersContainer {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        #listDisplay {
            font-size: 18px;
            font-weight: normal;
        }

        #drawnNumbersContainer {
            font-size: 18px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
            margin-top: 30px;
        }

        #logo {
            display: block;
            margin: 0 auto;
            width: 35%;
        }

        #menuButton {
            position: absolute;
            left: 10px;
            top: 10px;
            font-size: 24px;
            background: red;
        }

        /* SIDE MENU */
        #sideMenu {
            position: fixed;
            top: 0;
            left: 0;
            width: 300px;
            height: 100%;
            background: #222;
            color: white;
            padding: 20px;
            overflow-y: auto;

            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        #sideMenu.open {
            transform: translateX(0);
        }

        #closeMenuButton {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            color: white;
            font-size: 22px;
            border: none;
            cursor: pointer;
        }

        #sideInput {
            width: 90%;
            padding: 10px;
            font-size: 16px;
            margin-top: 40px;
        }

        #sideList {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        #sideList li {
            padding: 8px;
            border-bottom: 1px solid #555;
            cursor: pointer;
        }

        #sideList li:hover {
            background: #444;
        }

        #clearButton {
            margin-top: 20px;
        }

        #listTypeSelect {
            width: 95%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
        }

        /* MAKE SIDE MENU BUTTONS RED */
        #sideMenu button {
            background-color: #e40521;
            color: white;
        }
    </style>
</head>

<body>

<button id="menuButton" onclick="toggleMenu()">☰</button>

<div id="sideMenu">
    <button id="closeMenuButton" onclick="toggleMenu()">✖</button>

    <h2>Add Karts</h2>

    <select id="listTypeSelect" onchange="switchListType()">
        <option value="SODI">SODI</option>
        <option value="DMAX">DMAX</option>
    </select>

    <input type="text" id="sideInput" placeholder="Enter kart number">

    <ul id="sideList"></ul>

    <br>
    <button onclick="applyList()">Use This List</button>

    <br>
    <button id="clearButton" onclick="clearAll()">Clear All</button>
</div>

<img id="logo" src="logo.png" alt="Logo">

<div id="output">Kart Number:</div>

<br><br>

<button id="drawSodiButton" onclick="generateRandomNumber('SODI')">Draw SODI</button>
<button id="drawDmaxButton" onclick="generateRandomNumber('DMAX')">Draw DMAX</button>

<br><br>

<div id="listDisplay">Your List:</div>
<div id="remainingCount">Karts left to draw:</div>

<div id="drawnNumbersContainer">
    Numbers Drawn So Far: <span id="drawnNumbers"></span>
</div>

<script>
let sodiList = [];
let sodiDrawn = [];

let dmaxList = [];
let dmaxDrawn = [];

let tempList = [];
let currentType = "SODI";

// TOGGLE MENU
function toggleMenu() {
    document.getElementById("sideMenu").classList.toggle("open");
}

// SWITCH LIST TYPE
function switchListType() {
    currentType = document.getElementById("listTypeSelect").value;
    tempList = [];
    updateSideList();
}

// ADD NUMBER ON ENTER
document.getElementById("sideInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        const value = this.value.trim();
        if (value === "") return;

        if (tempList.includes(value)) {
            alert("Kart already added!");
            return;
        }

        tempList.push(value);
        updateSideList();
        this.value = "";
        this.blur();
    }
});

// UPDATE SIDE LIST
function updateSideList() {
    const list = document.getElementById("sideList");
    list.innerHTML = "";

    tempList.forEach((num, index) => {
        const li = document.createElement("li");
        li.textContent = num;

        li.onclick = () => {
            tempList.splice(index, 1);
            updateSideList();
        };

        list.appendChild(li);
    });
}

// APPLY LIST
function applyList() {
    if (tempList.length === 0) {
        alert("Add at least one kart.");
        return;
    }

    if (currentType === "SODI") {
        sodiList = [...tempList];
        sodiDrawn = [];
    } else {
        dmaxList = [...tempList];
        dmaxDrawn = [];
    }

    updateDisplay();
    toggleMenu();
}

// DRAW
function generateRandomNumber(type) {
    let list = type === "SODI" ? sodiList : dmaxList;
    if (list.length === 0) {
        alert(`No karts in ${type} list.`);
        return;
    }

    animateDraw(type);
}

// ANIMATION
function animateDraw(type) {
    const outputElement = document.getElementById("output");
    let iterations = 0;

    let list = type === "SODI" ? sodiList : dmaxList;
    let drawn = type === "SODI" ? sodiDrawn : dmaxDrawn;

    const interval = setInterval(() => {
        const temp = list[Math.floor(Math.random() * list.length)];
        outputElement.innerText = `${type} Kart: ${temp}`;
        iterations++;

        if (iterations >= 20) {
            clearInterval(interval);
            const final = drawFromList(list, drawn);
            outputElement.innerText = `${type} Kart: ${final}`;
            updateDisplay();
        }
    }, 100);
}

// DRAW FROM LIST
function drawFromList(list, drawnList) {
    const index = Math.floor(Math.random() * list.length);
    const number = list[index];

    list.splice(index, 1);
    drawnList.push(number);

    return number;
}

// UPDATE DISPLAY
function updateDisplay() {
    document.getElementById("listDisplay").innerText =
        `SODI: ${sodiList.join(", ")} | DMAX: ${dmaxList.join(", ")}`;

    document.getElementById("remainingCount").innerText =
        `SODI Remaining: ${sodiList.length} | DMAX Remaining: ${dmaxList.length}`;

    document.getElementById("drawnNumbers").innerText =
        `SODI: ${sodiDrawn.join(", ")} | DMAX: ${dmaxDrawn.join(", ")}`;

    if (sodiList.length === 0 && dmaxList.length === 0) {
        document.getElementById("remainingCount").innerText = "All karts drawn!";
        document.getElementById("output").innerText = "Kart Number: None";
    }
}

// CLEAR
function clearAll() {
    const password = prompt("Enter password to clear data:");

    if (password === "Sandown2024") {
        if (confirm("Are you sure?")) {
            sodiList = [];
            sodiDrawn = [];
            dmaxList = [];
            dmaxDrawn = [];
            tempList = [];

            document.getElementById("sideList").innerHTML = "";
            document.getElementById("output").innerText = "Kart Number:";
            document.getElementById("listDisplay").innerText = "Your List:";
            document.getElementById("remainingCount").innerText = "Karts left to draw:";
            document.getElementById("drawnNumbers").innerText = "";
        }
    } else {
        alert("Incorrect password.");
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Daytona Kart Draw</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<button id="menuButton" onclick="toggleMenu()">☰</button>

<div id="sideMenu">
    <button id="closeMenuButton" onclick="toggleMenu()">✖</button>

    <h2>Add Karts</h2>

    <select id="listTypeSelect" onchange="switchListType()">
        <option value="SODI_LIGHT">SODI Lightweight</option>
        <option value="SODI_HEAVY">SODI Heavyweight</option>
        <option value="DMAX_LIGHT">DMAX Lightweight</option>
        <option value="DMAX_HEAVY">DMAX Heavyweight</option>
    </select>

    <input type="text" id="sideInput" placeholder="Enter kart number">

    <ul id="sideList"></ul>

    <br>
    <button onclick="applyList()">Use This List</button>

    <br>
    <button id="clearButton" onclick="clearAll()">Clear All</button>
</div>

<img id="logo" src="logo.png" alt="Logo">

<div id="output">Kart Number:</div>

<br><br>

<button id="drawSodiLightButton" onclick="generateRandomNumber('SODI_LIGHT')">Draw SODI LW</button>
<button id="drawSodiHeavyButton" onclick="generateRandomNumber('SODI_HEAVY')">Draw SODI HW</button>
<button id="drawDmaxLightButton" onclick="generateRandomNumber('DMAX_LIGHT')">Draw DMAX LW</button>
<button id="drawDmaxHeavyButton" onclick="generateRandomNumber('DMAX_HEAVY')">Draw DMAX HW</button>

<br><br>

<div id="listDisplay">Your List:</div>
<div id="remainingCount">Karts left to draw:</div>

<div id="drawnNumbersContainer">
    Numbers Drawn So Far: <span id="drawnNumbers"></span>
</div>

<script src="script.js"></script>

</body>
</html>
